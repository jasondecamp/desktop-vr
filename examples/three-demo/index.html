<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parallax Display — Three.js Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }
    canvas { display: block; }
    #overlay {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      font-size: 13px;
      line-height: 1.6;
      background: rgba(0, 0, 0, 0.7);
      padding: 12px 16px;
      border-radius: 8px;
      pointer-events: none;
    }
    #start-btn {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      font-size: 18px;
      padding: 16px 32px;
      border: 2px solid #fff;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      pointer-events: auto;
    }
    #start-btn:hover { background: rgba(255, 255, 255, 0.15); }
  </style>
</head>
<body>
  <div id="overlay">
    <div>Eye position: <span id="eye-pos">waiting...</span></div>
    <div>Status: <span id="status">not started</span></div>
  </div>
  <button id="start-btn">Click to Start Head Tracking</button>
  <script type="module" src="./main.ts"></script>
</body>
</html>
