<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parallax Display — Demos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 32px;
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      color: #7eb8ff;
    }
    p {
      color: #888;
      font-size: 14px;
      max-width: 480px;
      text-align: center;
      line-height: 1.6;
    }
    .demos {
      display: flex;
      gap: 24px;
    }
    a {
      display: block;
      padding: 20px 32px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      color: #7eb8ff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }
    a:hover {
      background: rgba(126, 184, 255, 0.1);
      border-color: rgba(126, 184, 255, 0.3);
    }
    a span {
      display: block;
      font-size: 12px;
      color: #666;
      margin-top: 6px;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <h1>Parallax Display</h1>
  <p>Head-tracking parallax 3D display engine using webcam-based eye tracking. Choose a demo below.</p>
  <div class="demos">
    <a href="/examples/three-demo/index.html">
      Three.js Demo
      <span>3D targets in a grid room</span>
    </a>
    <a href="/examples/css-demo/index.html">
      CSS 3D Demo
      <span>Depth-layered cards and shapes</span>
    </a>
    <a href="/examples/desktop-demo/index.html">
      Parallax Desktop
      <span>Head-tracked homescreen with depth layers</span>
    </a>
  </div>
</body>
</html>
